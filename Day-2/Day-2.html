<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hindusthan College - Student Registration</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <header>
        <h1>HINDUSTHAN INSTITUTE OF TECHNOLOGY</h1>
    </header>

    <nav>
        <a href="https://hit.edu.in/">Home</a>
        <a href="https://hit.edu.in/artificial-intelligence-and-data-science.html">Courses</a>
    </nav>

    <div class="container">

        <h2>Student Registration Form</h2>

        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter your mobile number" required>
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
            <label>Gender</label>

            <div class="gender">

                <input type="radio" name="gender" id="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female">
                <label for="female">Female</label>
                <input type="radio" name="gender" id="other">
                <label for="other">Others</label>
            </div>

            <label for="department">Department</label>

            <select id="department">
                <option>Select Department</option>
                <option>Artificial Intelligence and Data Science</option>
                <option>Computer Science and Engineering</option>
                <option>Information Technology</option>
                <option>Electronics and Communication Engineering</option>
                <option>Mechanical Engineering</option>
                <option>Civil Engineering</option>
            </select>

            <label for="city">City</label>

            <select id="city">
                <option>Select City</option>
                <option>Coimbatore</option>
                <option>Chennai</option>
                <option>Bengaluru</option>
                <option>Madurai</option>
                <option>Salem</option>
            </select>

            <label for="remarks">Remarks</label>

            <textarea id="remarks" rows="4" placeholder="Enter your remarks"></textarea>
            <div class="buttons">
                <button type="submit" class="register">Register</button>
                <button type="reset" class="reset">Reset</button>
            </div>
        </form>
    </div>

</body>
</html>
